name: labellens
description: AI-powered ingredient safety scanner
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  dio: ^5.4.3
  supabase_flutter: ^2.3.4
  camera: ^0.10.5+9
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.0.7
  speech_to_text: ^7.3.0
  flutter_tts: ^3.8.5
  flutter_animate: ^4.5.0
  phosphor_flutter: ^2.0.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
